<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">

    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0">

    <title>Khanaya Website</title>

    <link rel="stylesheet" href="tugas1.css">

</head>

<body>

    <div class="container">
        
        <div class="header">
            <h1> KHANAYA KAMLAU WEBSITE </h1>
            <p>HTML • CSS • JavaScript</p>
        </div>

        <div class="card">
            <h2>Biodata</h2>
            <p class="deskripsi"> Halo! saya mahasiswa yang tertarik untuk terus
                mengembangkan keterampilan serta memiliki kemauan mempelajari hal baru.
            </p>
            <button id="bioBtn">
                Tampilkan Biodata
            </button>
            <p id="bio"></p>
        </div>

        <div class="card">
            <h2>Warna</h2>
            <button id="colorBtn">
                Ubah Tema
            </button>
        </div>

        <div class="card">
            <h2>Aktivitas</h2>
            <input 
                type="text"
                id="aktivitasInput"
                placeholder="Masukkan aktivitas">
            <button id="addBtn">
                Tambah
            </button>
            <ul id="aktivitasList"></ul>
        </div>

    </div>

    <script src="tugas1.js"></script>

</body>

</html>
